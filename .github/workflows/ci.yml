name: CI - chay test

#dieu kien de chay pipeline
#trigger chay test khi push code len github
#thuc te khi tao pull request se trigger pipeline
#merge pull request se trigger pipeline
on:
    push:
        branches: [main,master]
    pull_request:
        branches: [main,master]
jobs: 
    test: #define step test
        #chon moi truong de chay step test
        # ubuntu-latest: môi trường linux
         # windows-latest: môi trường windows
        # macos-latest: môi trường macos
        runs-on: ubuntu-latest
        steps:
          # B1: Clone source code tu github
          - name: checkout code
            uses: actions/checkout@v4
          # B2 thiet lap tren moi truong node.js
          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
                node-version: '20'
                cache: npm #cache nay giup tang toc do build playwright nhanh hon
            
              # B3 cai dat cac thu vien trong source code playwright
          - name: Install dependencies
            run: npm install

          - name: Cache Playwright browsers
            uses: actions/cache@v4
            with:
              path: ~/.cache/ms-playwright
              key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

        

          - name: Verify secrets
            run: |
             [ -n "$BASE_URL" ] && echo "BASE_URL Exist" || echo "BASE_URL Missing"
             [ -n "$ADMIN_USER" ] && echo "ADMIN_USER Exist" || echo "ADMIN_USER Missing"
             [ -n "$ADMIN_PASSWORD" ] && echo "ADMIN_PASSWORD" || echo "ADMIN_PASSWORD Missing"
            
            #B4 cai browser co san cua playwright
            # --with-deps cai dat cac thu vien phu thuoc cua browser
          - name: Install playwright browsers
            run: npx playwright install --with-deps

            #B5 chay test
          - name: Run playwright test
            run: npx playwright test --workers=2
            env:
             BASE_URL: ${{ secrets.BASE_URL }}
             ADMIN_USER: ${{ secrets.ADMIN_USER }}
             ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          - name: Upload Playwright report
            if: always()
            uses: actions/upload-artifact@v4
            with:
              name: playwright-report
              path: playwright-report/ 
                # Upload thư mục report
          - name: Upload Pages Artifact
            if: always()
            uses: actions/upload-pages-artifact@v3
            with:
             path: playwright-report

               # Deploy lên GitHub Pages
          - name: Deploy to GitHub Pages
            if: always()
            id: deployment
            uses: actions/deploy-pages@v4
          - name: Send Email
            if: always()
            uses: dawidd6/action-send-mail@v3
            with:
              server_address: smtp.gmail.com
              server_port: 465
              secure: true
              username: ${{ secrets.EMAIL_USERNAME }}
              password: ${{ secrets.EMAIL_PASSWORD }}
              subject: Playwright Test Results - ${{ job.status }}
              to: duongminhquang2k3@gmail.com
              from: GitHub Actions
              body: |
                Playwright tests have finished.

                Result: ${{ job.status }}

                Repository:
                ${{ github.repository }}

                Workflow Run:
                https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

                HTML Report:
                ${{ steps.deployment.outputs.page_url }}